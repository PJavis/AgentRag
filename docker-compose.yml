services:
  postgres:
    image: postgres:16-alpine
    container_name: pam-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.15.0
    container_name: pam-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - bootstrap.memory_lock=true
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ulimits:
      memlock: -1
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health?pretty || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pam-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Ollama (profile: local-llm) ───────────────────────────────────────────
  # Yêu cầu: NVIDIA GPU + NVIDIA Container Toolkit
  # Cài toolkit: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
  #
  # Khởi động:
  #   docker compose --profile local-llm up -d
  #
  # Pull model sau khi container chạy:
  #   docker exec pam-ollama ollama pull qwen2.5:7b-instruct
  #   docker exec pam-ollama ollama pull nomic-embed-text
  #
  # .env khi dùng container Ollama:
  #   OLLAMA_BASE_URL=http://ollama:11434/v1/
  ollama:
    image: ollama/ollama:latest
    container_name: pam-ollama
    profiles: ["local-llm"]
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h          # giữ model trong VRAM 24h sau lần dùng cuối
      - OLLAMA_MAX_LOADED_MODELS=2     # tối đa 2 model cùng lúc trong VRAM
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all               # dùng tất cả GPU (đổi thành count: 1 nếu muốn giới hạn)
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s               # chờ Ollama khởi động xong trước khi check

volumes:
  postgres_data:
  es_data:
  redis_data:
  ollama_data:
